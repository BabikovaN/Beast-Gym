<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beast Gym</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">
    <a href="/Beast-Gym/index.html">
      <img src="Logo BG.svg" alt="Beast Gym">
    </a>
  </div>

  <button class="burger" onclick="toggleMenu()" aria-label="Меню" type="button">☰</button>

  <nav id="menu">
    <a href="/Beast-Gym/index.html">Головна</a>
    <a href="/Beast-Gym/about.html">Про нас</a>
    <a href="/Beast-Gym/price.html">Тарифи</a>
    <a href="/Beast-Gym/photos.html">Фото</a>
    <a href="/Beast-Gym/admin.html" class="admin-link">Адміністратор</a>
  </nav>
</header>

<div id="menuOverlay" class="menu-overlay"></div>

<main class="page">
  <section class="hero-grid">
    <div class="hero-image-wrap">
      <img
        class="hero-image"
        src="https://images.unsplash.com/photo-1583454110551-21f2fa2afe61?auto=format&fit=crop&w=1400&q=80"
        alt="Beast Gym"
      >
    </div>

    <div class="hero-side">
      <section class="card hero-card">
        <h1>Beast Gym</h1>
        <p>Сучасний зал у Черкасах</p>
        <p>Тренери • Програми • Результат</p>
      </section>

      <section class="hero-address">
        <p>Черкаси, вул.<br>Грушевського 110</p>
      </section>
    </div>
  </section>

  <section class="content-grid">
    <section class="card section-card">
      <h2>Тренери</h2>
      <div id="trainers" class="trainers-list"></div>
    </section>

    <section class="card section-card">
      <h2>Прайс</h2>
      <div class="price-list">
        <p>Разове відвідування — 250 грн</p>
        <p>1 місяць — 900 грн</p>
        <p>3 місяці — 2500 грн</p>
      </div>
    </section>

    <section class="card section-card map-card full-width">
      <h2>Ми на карті</h2>
      <div class="map-wrap">
        <iframe
          src="https://maps.google.com/maps?q=49.4469666,32.0508936&z=17&output=embed"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          allowfullscreen>
        </iframe>
      </div>
    </section>
  </section>
</main>

<footer class="footer">
  <p>Beast Gym • Черкаси, вул. Грушевського 110</p>
</footer>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="script.js"></script>

</body>
</html>
