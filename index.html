<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beast Gym Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
  overflow-x: hidden;
}

/* TOP BAR */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px;
  background: #111;
  border-bottom: 2px solid #39ff14;
  position: relative;
}

.left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo { width: 45px; }

h1 {
  font-size: 18px;
  color: yellow;
  margin: 0;
}

/* BURGER */
.menu-btn {
  font-size: 26px;
  background: none;
  border: none;
  color: white;
  cursor: pointer;
}

/* MENU */
.menu {
  display: none;
  flex-direction: column;
  position: absolute;
  right: 10px;
  top: 60px;
  background: #111;
  border: 1px solid #39ff14;
  min-width: 180px;
  z-index: 1000;
}

.menu a {
  padding: 12px;
  text-decoration: none;
  color: white;
  border-bottom: 1px solid #222;
}
.menu a:hover { color: #39ff14; }

/* APP ANIMATION */
.container {
  padding: 15px;
  transition: transform 0.4s ease, opacity 0.4s ease;
}

.tab {
  display: none;
  animation: fade 0.3s ease;
}

.active { display: block; }

@keyframes fade {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

/* CARDS */
.card {
  background: #151515;
  border: 1px solid #39ff14;
  padding: 15px;
  margin: 12px 0;
  border-radius: 15px;
  box-shadow: 0 0 10px #39ff14;
}

/* BUTTONS */
button {
  padding: 10px;
  border: none;
  background: #39ff14;
  font-weight: bold;
  cursor: pointer;
}

/* TRAINER */
.trainer {
  background: #222;
  padding: 10px;
  border-radius: 12px;
  margin-top: 10px;
}
.trainer img {
  width: 100%;
  max-width: 200px;
  border-radius: 10px;
}

/* LOGIN SCREEN */
.login {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}

.login-box {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  border: 1px solid #39ff14;
  width: 280px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

/* INSTAGRAM */
a { color: #ff3cac; text-decoration: none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <h2>🔐 Адмін вхід</h2>

    <input id="user" placeholder="Логін">
    <input id="pass" type="password" placeholder="Пароль (до 6 символів)">

    <button onclick="login()">Увійти</button>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="left">
    <img src="Logo BG.svg" class="logo">
    <h1>Beast Gym</h1>
  </div>

  <button class="menu-btn" onclick="toggleMenu()">☰</button>

  <div class="menu" id="menu">
    <a onclick="openTab('clubs')">Клуби</a>
    <a onclick="openTab('trainers')">Тренери</a>
    <a onclick="openTab('about')">Про нас</a>
    <a onclick="openTab('prices')">Тарифи</a>
    <a onclick="openTab('admin')">⚙ Адмін</a>
  </div>
</div>
<!-- відео -->
<div class="container" id="container">
  <div class="card">
  <h2>🎥 Відео залу</h2>

  <video controls>
    <source src="./video.mp4" type="video/mp4">
    Ваш браузер не підтримує відео
  </video>

</div>

<!-- CLUBS -->
<div id="clubs" class="tab active">
  <div class="card">
    <h2>🏋️ Зал</h2>
    <p>Сучасний фітнес-клуб у Черкасах</p>
  </div>
</div>

<!-- TRAINERS -->
<div id="trainers" class="tab">
  <div class="card">
    <h2>🏆 Тренери</h2>
    <div id="trainerList"></div>
  </div>
</div>

<!-- ABOUT -->
<div id="about" class="tab">
  <div class="card">
    <h2>📍 Про нас</h2>
    <p>Beast Gym — преміум фітнес клуб</p>
  </div>
</div>

<!-- PRICES -->
<div id="prices" class="tab">
  <div class="card">
    <h2>💰 Тарифи</h2>
    <p>Абонементи доступні в клубі</p>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="tab">
  <div class="card">
    <h2>⚙ Адмін-панель</h2>

    <input id="name" placeholder="Ім'я">
    <input id="photo" placeholder="Фото URL">
    <input id="insta" placeholder="Instagram">

    <button onclick="addTrainer()">Додати</button>
  </div>
</div>

</div>

<script>

let isAuth = false;

/* LOGIN */
function login() {
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  if (user === "admin" && pass === "123456") {
    document.getElementById("login").style.display = "none";
    isAuth = true;
    alert("Вхід успішний ✅");
  } else {
    alert("Невірний логін або пароль ❌");
  }
}
/* MENU */
function toggleMenu() {
  let m = document.getElementById("menu");
  m.style.display = (m.style.display === "flex") ? "none" : "flex";
}

/* TABS */
function openTab(id) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.getElementById("menu").style.display = "none";
}

/* ADD TRAINER */
function addTrainer() {
  if (!isAuth) return alert("Треба увійти як адмін!");

  let name = document.getElementById("name").value;
  let photo = document.getElementById("photo").value;
  let insta = document.getElementById("insta").value;

  let data = JSON.parse(localStorage.getItem("trainers")) || [];
  data.push({ name, photo, insta });

  localStorage.setItem("trainers", JSON.stringify(data));

  render();
}

/* SHOW */
function render() {
  let box = document.getElementById("trainerList");
  box.innerHTML = "";

  let data = JSON.parse(localStorage.getItem("trainers")) || [];

  data.forEach(t => {
    box.innerHTML += `
      <div class="trainer">
        <img src="${t.photo}">
        <h3>${t.name}</h3>
        <a href="${t.insta}" target="_blank">Instagram</a>
      </div>
    `;
  });
}

render();

/* SWIPE */
let startX = 0;
let tabs = ["clubs","trainers","about","prices","admin"];
let index = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  let diff = startX - endX;

  if (Math.abs(diff) > 50) {
    if (diff > 0) index++;
    else index--;

    if (index < 0) index = 0;
    if (index >= tabs.length) index = tabs.length - 1;

    openTab(tabs[index]);
  }
});

</script>

</body>
</html>
