<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Beast Gym CRM</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🏋️ Beast Gym</h1>

<div class="card">
  <h2>👨‍🏫 Тренери</h2>
  <div id="trainers"></div>
</div>

<div class="card">
  <h2>📸 Пости</h2>
  <div id="posts"></div>
</div>

<div class="card">
  <h2>💬 Чат</h2>

  <div id="chatBox" style="height:200px;overflow:auto"></div>

  <input id="msg">
  <button onclick="sendMsg()">Send</button>
</div>

<div class="card">
  <h2>📅 Розклад</h2>
  <div id="slots"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
