<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beast Gym</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🏋️ Gym Booking</h1>

<div class="card">
  <h2>📅 Запис</h2>

  <select id="trainerSelect"></select>
  <input type="date" id="date">
  <input type="time" id="time">

  <button onclick="book()">Записатися</button>
</div>

<div class="card">
  <h2>👤 Мої записи</h2>
  <div id="myBookings"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "YOUR_API_KEY",
  projectId: "YOUR_PROJECT_ID"
});

const db = firebase.firestore();

/* LOAD TRAINERS */
db.collection("users").where("role","==","trainer")
.onSnapshot(snap=>{
  let html = "";
  snap.forEach(d=>{
    html += `<option value="${d.id}">${d.data().name}</option>`;
  });
  trainerSelect.innerHTML = html;
});

/* BOOK */
function book(){
  db.collection("bookings").add({
    userId: "USER_1",
    trainerId: trainerSelect.value,
    date: date.value,
    time: time.value,
    status: "pending"
  });

  alert("⏳ Очікує підтвердження");
}

/* MY BOOKINGS */
db.collection("bookings")
.where("userId","==","USER_1")
.onSnapshot(snap=>{
  let html = "";

  snap.forEach(d=>{
    let b = d.data();

    html += `
      <div class="card">
        💪 ${b.trainerId}<br>
        📅 ${b.date} ${b.time}<br>
        Status: ${b.status}
      </div>
    `;
  });

  myBookings.innerHTML = html;
});
</script>

</body>
</html>
