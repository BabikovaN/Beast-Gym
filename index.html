<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beast Gym</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- HEADER -->
<header>

  <div class="logo">
    <img src="Logo BG.svg">
  </div>

  <div class="burger" onclick="toggleMenu()">☰</div>

  <nav id="menu">
    <a href="#">Головна</a>
    <a href="#">Про нас</a>
    <a href="#">Тарифи</a>
    <a href="#">Фото</a>
    <a href="#">Контакти</a>
  </nav>

</header>

<div class="space"></div>

<!-- БАНЕР -->
<div class="slider">
  <img src="https://images.unsplash.com/photo-1599058917765-a780eda07a3e">
</div>

<!-- ПРО ЗАЛ -->
<div class="card">
  <h1>Beast Gym</h1>
  <p>Сучасний зал у Черкасах</p>
  <p>Тренери • Програми • Результат</p>
</div>

<!-- ТРЕНЕРИ -->
<div class="card">
  <h2>Тренери</h2>
  <div id="trainers"></div>
</div>

<!-- ПРАЙС -->
<div class="card">
  <h2>Прайс (коротко)</h2>
  <p>Разове — 250 грн</p>
  <p>1 місяць — 900 грн</p>
  <p>3 місяці — 2500 грн</p>
</div>

<!-- КАРТА -->
<div class="card">
  <h2>Ми на карті</h2>

  <div class="map">
    <iframe 
    src="https://maps.google.com/maps?q=49.4469666,32.0508936&z=17&output=embed">
    </iframe>
  </div>
</div>

<footer class="footer">
  <p>Черкаси, вул. Грушевського 110</p>
</footer>

</div>

<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
