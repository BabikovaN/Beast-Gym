<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beast Gym</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="Logo BG.svg" alt="Beast Gym">
  </div>
  
  <div class="burger" onclick="toggleMenu()">☰</div>
<nav id="menu">
      <a href="index.html">Головна</a>
      <a href="about.html">Про нас</a>
      <a href="price.html">Тарифи</a>
      <a href="photos.html">Фото</a>
      <a href="products.html">Продукція</a>
      <a href="vacancies.html">Вакансії</a>
      <a href="rules.html">Правила</a>
      <a href="contacts.html">Контакти</a>
</nav>
</header>

<div id="menuOverlay" class="menu-overlay"></div>

<main class="page">

  <section class="hero-grid">
    <div class="hero-image-wrap">
      <img
        class="hero-image"
        src="https://images.unsplash.com/photo-1583454110551-21f2fa2afe61?auto=format&fit=crop&w=1400&q=80"
        alt="Beast Gym"
      >
    </div>


  <section class="content-grid">
    <section class="card section-card">
      <h2>Тренери</h2>
      <div id="trainers" class="trainers-list"></div>
    </section>

    <section class="card section-card">
      <h2>АБОНЕМЕНТИ</h2>
      <p>Карта повного дня  — 900 грн</p>
      <p>Студент карта - 850 грн</p> 
      <p>Сімейна карта -800 грн</p> 
      <p>Разове відвідування — 250 грн</p>
    </section>

    <section class="card section-card map-card full-width">
      <h2>Ми на карті</h2>
      <div class="map-wrap">
        <iframe
          src="https://maps.google.com/maps?q=49.4469666,32.0508936&z=17&output=embed"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          allowfullscreen>
        </iframe>
      </div>
    </section>
  </section>

</main>

<footer class="footer">
  <p>Beast Gym • Черкаси, вул. Грушевського 110</p>
</footer>


<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
