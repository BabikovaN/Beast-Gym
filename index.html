<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beast Gym</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- 🔥 HEADER -->
<header>

  <div class="logo">
    <img src="Logo BG.svg">
  </div>

  <div class="burger" onclick="toggleMenu()">☰</div>

  <nav id="menu">
    <a href="#">Головна</a>
    <a href="#">Про нас</a>
    <a href="#">Тарифи</a>
    <a href="#">Фото</a>
    <a href="#">Контакти</a>
  </nav>

</header>

<div class="space"></div>

<!-- 🔥 HERO -->
<section class="slider">
  <img src="https://images.unsplash.com/photo-1583454110551-21f2fa2afe61">
</section>

<!-- 🔥 ПРО ЗАЛ -->
<div class="card">
  <h1>Beast Gym</h1>
  <p>Сучасний зал у Черкасах</p>
  <p>Тренери • Програми • Результат</p>
</div>

<!-- 🔥 ТРЕНЕРИ -->
<div class="card">
  <h2>Тренери</h2>
  <div id="trainers"></div>
</div>

<!-- 🔥 ПОСТИ -->
<div class="card">
  <h2>Пости</h2>
  <div id="posts"></div>
</div>

<!-- 🔥 ЧАТ -->
<div class="card">
  <h2>Чат</h2>
  <div id="chatBox"></div>

  <input id="msg" placeholder="Написати повідомлення...">
  <button onclick="sendMsg()">Відправити</button>
</div>

<!-- 🔥 СЛОТИ -->
<div class="card">
  <h2>Запис</h2>
  <div id="slots"></div>
</div>

<!-- 🔥 ПРАЙС -->
<div class="card">
  <h2>Прайс</h2>
  <p class="price">Разове — 250 грн</p>
  <p class="price">1 місяць — 900 грн</p>
  <p class="price">3 місяці — 2500 грн</p>
</div>

<!-- 🔥 КАРТА -->
<div class="card">
  <h2>Ми на карті</h2>

  <iframe 
    src="https://maps.google.com/maps?q=49.4469666,32.0508936&z=17&output=embed">
  </iframe>
</div>

<!-- 🔥 FOOTER -->
<footer class="footer">
  <p>Черкаси, вул. Грушевського 110</p>
</footer>

</div>

<!-- 🔥 Firebase бібліотеки -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- 🔥 ТВОЇ ФАЙЛИ -->
<script src="firebase.js"></script>

</body>
</html>
