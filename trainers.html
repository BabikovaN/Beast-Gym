<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренери</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🏋️ Тренери</h1>
</header>

<section class="card">
  <div id="trainers"></div>
</section>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

<script>
firebase.firestore()
  .collection("users")
  .where("role", "==", "trainer")
  .onSnapshot(snap => {

    let html = "";

    snap.forEach(doc => {
      const d = doc.data();

      html += `
        <div class="card">
          <h3>👤 ${d.name || "Без імені"}</h3>
          <p>💪 ${d.speciality || "Без спеціалізації"}</p>
        </div>
      `;
    });

    document.getElementById("trainers").innerHTML = html;
  });
</script>

</body>
</html>
