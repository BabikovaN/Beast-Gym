<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренери</title>

<link rel="stylesheet" href="style.css">

<style>
body{
  font-family: Arial;
  background:#0f0f0f;
  color:white;
}

/* GRID */
#trainers{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
  gap:15px;
  padding:15px;
}

/* CARD */
.trainer-card{
  background:#1a1a1a;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 0 15px rgba(57,255,20,0.3);
  transition:0.3s;
}

.trainer-card:hover{
  transform:translateY(-5px);
}

/* IMAGE */
.trainer-card img{
  width:100%;
  aspect-ratio:4/5;
  object-fit:cover;
}

/* BODY */
.card-body{
  padding:12px;
  text-align:center;
}

h2{
  margin:5px 0;
  font-size:18px;
}

p{
  margin:5px 0;
  color:#aaa;
}

.stars{
  color:#ffd000;
  margin:8px 0;
}

/* BUTTONS */
.btn{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.btn-book{
  background:#39ff14;
  color:black;
}

.btn-profile{
  background:#333;
  color:white;
}

.btn:hover{
  opacity:0.8;
}
</style>

</head>

<body>

<header style="text-align:center; padding:15px;">
  <h1>🏋️ Тренери</h1>
</header>

<section id="trainers"></section>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="firebase.js"></script>

<script>
const db = firebase.firestore();
let user = null;

/* AUTH SAFE */
let user = null;

auth.onAuthStateChanged(u=>{
  user = u;
});

/* LOAD TRAINERS */
db.collection("users")
.where("role","==","trainer")
.onSnapshot(snap=>{

  let html = "";

  snap.forEach(doc=>{
    const t = doc.data();
    const stars = "⭐".repeat(t.rating || 0);

    html += `
      <div class="trainer-card">

        <img src="${t.photo || 'https://via.placeholder.com/400x500'}">

        <div class="card-body">

          <h2>${t.name || "Тренер"}</h2>
          <p>💪 ${t.speciality || "Фітнес"}</p>

          <div class="stars">${stars}</div>

          <button class="btn btn-book" onclick="bookTrainer('${doc.id}')">
            🏋️ Записатися
          </button>

          <button class="btn btn-profile" onclick="openProfile('${doc.id}')">
            👤 Профіль
          </button>

        </div>
      </div>
    `;
  });

  document.getElementById("trainers").innerHTML = html;
});

/* BOOK */
function bookTrainer(trainerId){

  if(!user){
    alert("Спочатку увійдіть!");
    return;
  }

  db.collection("trainings").add({
    uid: user.uid,
    trainerId: trainerId,
    date: new Date().toISOString(),
    status: "pending"
  });

  alert("✅ Запис створено!");
}
/* OPEN PROFILE */
function openProfile(id){
  window.location = "trainer-profile.html?id=" + id;
}
</script>

</body>
</html>
