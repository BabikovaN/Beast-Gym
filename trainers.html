<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренери</title>
<link rel="stylesheet" href="style.css">

<style>
.trainer-card{
  background:#1a1a1a;
  border-radius:15px;
  padding:15px;
  margin:10px;
  box-shadow:0 0 10px #39ff14;
  text-align:center;
}

.trainer-card img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:12px;
}

.stars{
  color:#ffd000;
  font-size:18px;
}

button{
  background:#39ff14;
  border:none;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  opacity:0.8;
}
</style>

</head>

<body>

<header>
  <h1>🏋️ Тренери</h1>
</header>

<section id="trainers"></section>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="firebase.js"></script>

<script>
const db = firebase.firestore();
let user;

firebase.auth().onAuthStateChanged(u=>{
  user = u;
});

db.collection("users")
.where("role","==","trainer")
.onSnapshot(snap=>{

  let html="";

  snap.forEach(doc=>{
    const t = doc.data();

    const stars = "⭐".repeat(t.rating || 5);

    html += `
      <div class="trainer-card">

        <img src="${t.photo || 'https://via.placeholder.com/300'}">

        <h2>${t.name || "Тренер"}</h2>

        <p>💪 ${t.speciality || "Фітнес"}</p>

        <div class="stars">${stars}</div>

        <button onclick="bookTrainer('${doc.id}')">
          🏋️ Записатися
        </button>

        <button onclick="openProfile('${doc.id}')">
          👤 Профіль
        </button>

      </div>
    `;
  });

  document.getElementById("trainers").innerHTML = html;
});

function bookTrainer(trainerId){

  if(!user){
    alert("Спочатку увійдіть!");
    return;
  }

  db.collection("trainings").add({
    uid: user.uid,
    trainerId: trainerId,
    date: new Date().toISOString()
  });

  alert("✅ Ви записані до тренера!");
}

function openProfile(id){
  window.location = "trainer-view.html?id=" + id;
}
</script>

</body>
</html>
