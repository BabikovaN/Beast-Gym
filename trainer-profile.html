<!--(профіль тренера)-->
<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кабінет тренера</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1 style="color:#ffd000;text-align:center;">КАБІНЕТ ТРЕНЕРА</h1>
</header>

<!-- 👥 КЛІЄНТИ -->
<section class="card">
  <h2>👥 Мої клієнти</h2>
  <div id="clients"></div>
</section>

<!-- 📅 ДОДАТИ ТРЕНУВАННЯ -->
<section class="card">
  <h2>📅 Додати тренування</h2>

  <input id="clientId" placeholder="ID клієнта">
  <input type="date" id="date">

  <select id="muscle">
    <option>Груди</option>
    <option>Спина</option>
    <option>Ноги</option>
    <option>Руки</option>
    <option>Кардіо</option>
  </select>

  <button onclick="addTraining()">➕ Додати</button>
</section>

<!-- 📋 РОЗКЛАД -->
<section class="card">
  <h2>📋 Розклад</h2>
  <div id="schedule"></div>
</section>

<!-- 📜 ІСТОРІЯ -->
<section class="card">
  <h2>📜 Історія тренувань</h2>
  <div id="history"></div>
</section>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>
<script src="trainer.js"></script>

</body>
</html>
