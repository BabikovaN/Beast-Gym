<!DOCTYPE html>
<html>
<head>
<title>Trainer Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>👨‍🏫 Trainer Profile</h1>

<div class="card">
  <h2>Мій профіль</h2>

  <input id="name" placeholder="Ім'я"><br><br>
  <input id="photo" placeholder="Фото URL"><br><br>
  <input id="speciality" placeholder="Спеціалізація"><br><br>

  <button onclick="saveProfile()">💾 Зберегти</button>
</div>

<div class="card">
  <h2>📅 Мої тренування</h2>
  <div id="myTrainings"></div>
</div>

<div class="card">
  <h2>📸 Мої пости</h2>
  <div id="myPosts"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="trainer.js"></script>

</body>
</html>
