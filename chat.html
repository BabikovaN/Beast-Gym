<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Chat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="chatBox"></div>

<input id="msg">
<button onclick="sendMsg()">Send</button>

<script src="firebase.js"></script>

<script>
let user;

auth.onAuthStateChanged(u=>{
  user = u;
});

function sendMsg(){
  db.collection("chats").add({
    from: user.uid,
    to: "trainerId", // потім зробимо динамічно
    text: document.getElementById("msg").value,
    time: Date.now()
  });
}
</script>

</body>
</html>
