<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Мої тренування</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h2>📅 Мої тренування</h2>
</header>

<div id="myTrainings"></div>

<script src="firebase.js"></script>

<script>
auth.onAuthStateChanged(user=>{
  if(!user){
    window.location = "login.html";
    return;
  }

  db.collection("trainings")
  .where("uid","==",user.uid)
  .onSnapshot(snap=>{
    let html="";

    snap.forEach(d=>{
      const t = d.data();

      html += `
        <div class="card">
          📅 ${t.date}<br>
          💪 ${t.muscle || ""}
        </div>
      `;
    });

    document.getElementById("myTrainings").innerHTML = html;
  });
});
</script>

</body>
</html>
