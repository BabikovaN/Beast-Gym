<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Gym CRM Admin</title>

<link rel="stylesheet" href="admin.css">
</head>

<body>

<h1>🔥 GYM CRM ADMIN</h1>

<!-- LOGIN -->
<div id="login">
  <input id="user" placeholder="Логін">
  <input id="pass" type="password" placeholder="Пароль">
  <button onclick="login()">Увійти</button>
</div>

<!-- DASHBOARD -->
<div class="admin-layout" id="adminPanel">

  <div class="sidebar">
    <a onclick="show('users')">👤 Users</a>
    <a onclick="show('trainers')">💪 Trainers</a>
    <a onclick="show('trainings')">📅 Trainings</a>
  </div>

  <div class="content">
    <div id="panel"></div>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "YOUR_API_KEY",
  projectId: "YOUR_PROJECT_ID"
});
</script>

<script src="admin.js"></script>

<script>
function login(){
  const u = user.value;
  const p = pass.value;

  if(u==="admin" && p==="1234"){
    login.style.display="none";
    adminPanel.style.display="flex";
    show("users");
  } else {
    alert("❌ Невірний логін");
  }
}
</script>

</body>
</html>
