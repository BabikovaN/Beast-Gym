<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 style="color:#ffd000; text-align:center;">ADMIN PANEL</h1>

<!-- МЕНЮ -->
<div class="card">
<h2>Редагування меню</h2>

<input id="linkText" placeholder="Назва (Напр: Головна)">
<input id="linkUrl" placeholder="URL (index.html)">

<button onclick="addMenu()">Додати пункт</button>
</div>

<!-- ТРЕНЕРИ -->
<div class="card">
<h2>Додати тренера</h2>

<input id="trainerName" placeholder="Ім'я тренера">
<input id="trainerDesc" placeholder="Опис">

<button onclick="addTrainer()">Додати</button>
</div>

<!-- ФОТО -->
<div class="card">
<h2>Додати фото</h2>

<input id="photoUrl" placeholder="URL фото">
<button onclick="addPhoto()">Додати фото</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script src="admin.js"></script>
</body>
</html>
