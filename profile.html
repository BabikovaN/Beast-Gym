<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мій профіль - Beast Gym</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔥 HEADER (як на головній) -->
<header>
  <div class="logo">
    <img src="Logo BG.svg" alt="Beast Gym">
  </div>

  <div class="burger" onclick="toggleMenu()">☰</div>

  <nav id="menu">

    <a href="index.html">Головна</a>
    <a href="about.html">Про нас</a>
    <a href="price.html">Тарифи</a>
    <a href="rules.html">Правила</a>
    <a href="photos.html">Фото</a>
    <a href="contacts.html">Контакти</a>

    <a href="profile.html">Мій профіль</a>
    <a href="trainer-profile.html">Кабінет тренера</a>

    <a href="admin.html" id="adminLink" style="display:none;">Адмін</a>

  </nav>
</header>

<h1 class="section-title">👤 МІЙ ПРОФІЛЬ</h1>

<!-- 🔥 ВИБІР РОЛІ -->
<div class="card">

  <h2>Оберіть кабінет</h2>

  <select id="roleSelect">
    <option value="">-- Вибрати --</option>
    <option value="client">👤 Клієнт</option>
    <option value="trainer">🏋️ Тренер</option>
    <option value="admin">⚙️ Адмін</option>
  </select>

  <button onclick="goToPanel()">Перейти</button>

</div>

<!-- 🔥 ВХІД / РЕЄСТРАЦІЯ -->
<div class="card">

  <h2>Вхід / Реєстрація</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Пароль">

  <button onclick="login()">Увійти</button>
  <button onclick="register()">Зареєструватись</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="firebase.js"></script>

<script>
function goToPanel() {
  const role = document.getElementById("roleSelect").value;

  if (role === "client") {
    window.location.href = "profile-client.html";
  }

  if (role === "trainer") {
    window.location.href = "trainer-profile.html";
  }

  if (role === "admin") {
    window.location.href = "admin.html";
  }
}

// 🔥 Firebase login
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(() => {
      alert("Вхід успішний");
    })
    .catch(err => alert(err.message));
}

// 🔥 Firebase register
function register() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  firebase.auth().createUserWithEmailAndPassword(email, password)
    .then(() => {
      alert("Реєстрація успішна");
    })
    .catch(err => alert(err.message));
}
</script>

<script src="script.js"></script>

</body>
</html>
