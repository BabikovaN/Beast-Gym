<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Мій профіль</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 style="color:#ffd000; text-align:center;">МІЙ ПРОФІЛЬ</h1>

<div class="card">
  <input id="name" placeholder="Твоє ім'я">
  <input id="photo" placeholder="URL фото">
  <button onclick="saveProfile()">Зберегти</button>
</div>

<div class="card">
  <h2>📅 Мої тренування</h2>
  <input id="date" type="date">
  <button onclick="addTraining()">Додати</button>
  <div id="list"></div>
</div>

<div class="card">
  <h2>🧑‍🏫 Обрати тренера</h2>
  <select id="trainer"></select>
  <button onclick="chooseTrainer()">Обрати</button>
</div>

<!-- 🔥 Firebase (ВАЖЛИВО - compat версія) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="firebase.js"></script>
<script src="profile.js"></script>

</body>
</html>
